services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: change_me_to_secure_string
      POSTGRES_DB: gym_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://gym_user:change_me_to_secure_string@db:5432/gym_db
      JWT_SECRET: ${JWT_SECRET:-replace_with_openssl_rand_hex_32}
      CORS_ORIGINS: http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata: