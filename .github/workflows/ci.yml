name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TEST_DATABASE_URL: postgresql+asyncpg://gym_user:gym_user_test@localhost:5432/gym_test

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check backend/app/

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: gym_user
          POSTGRES_PASSWORD: gym_user_test
          POSTGRES_DB: gym_test
        options: >-
          --health-cmd pg_isready -U gym_user -d gym_test
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: Run migrations
        run: |
          cd backend
          sed -i 's|sqlalchemy.url = .*|sqlalchemy.url = postgresql://gym_user:gym_user_test@localhost:5432/gym_test|' alembic.ini
          alembic upgrade head
      - run: cd backend && pytest tests/ -v --tb=short

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend