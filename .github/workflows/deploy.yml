name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy Backend
        run: |
          echo "Deploying backend to ${{ github.event.inputs.environment }}"
          docker pull ${{ secrets.DOCKER_USERNAME }}/gymbase-backend:latest
          # Add your deployment commands here (SSH, Kubernetes, etc.)

      - name: Deploy Frontend
        run: |
          echo "Deploying frontend to ${{ github.event.inputs.environment }}"
          docker pull ${{ secrets.DOCKER_USERNAME }}/gymbase-frontend:latest
          # Add your deployment commands here (SSH, Kubernetes, etc.)

      - name: Notify deployment
        run: |
          echo "Deployment completed successfully"